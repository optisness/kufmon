version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: kufmon
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgres://prisma:prisma@db:5432/kufmon
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    command: ["sh", "/app/docker-entrypoint.sh"]

volumes:
  db_data:
