name: CI + Deploy to Render

on:
  push:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || true

      - name: Build
        run: npm run build

      - name: Trigger Render deploy via webhook
        run: |
          if [ ! -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deploy via webhook..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Webhook triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set. Configure it in GitHub secrets."
          fi
